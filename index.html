<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pradeep & Jyoti Wedding</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: linear-gradient(to right, #f8e1f4, #fceabb);
      text-align: center;
      color: #5a2a27;
    }

    .container {
      padding: 60px 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    h2 {
      font-weight: normal;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 40px;
      max-width: 700px;
      margin: auto;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
      font-size: 20px;
      flex-wrap: wrap;
    }

    .time-box {
      background: #fff0f5;
      padding: 15px 20px;
      border-radius: 10px;
      min-width: 70px;
    }

    .gallery {
      margin-top: 50px;
    }

    .gallery h3 {
      margin-bottom: 20px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }

    .gallery-grid img {
      width: 100%;
      border-radius: 15px;
      height: 200px;
      object-fit: cover;
      transition: transform 0.3s ease;
      cursor: pointer;
    }

    .gallery-grid img:hover {
      transform: scale(1.05);
    }

    .footer {
      margin-top: 40px;
      font-size: 18px;
    }

    .heart {
      color: #d63384;
    }

    @media (max-width: 600px) {
      h1 { font-size: 34px; }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="card">
      <h1>Pradeep <span class="heart">❤️</span> Jyoti</h1>
      <h2>Together with their families<br>Invite you to celebrate their Wedding</h2>

      <p><strong>Wedding Date:</strong><br> 20 December 2026</p>
      <p><strong>Venue:</strong><br> Grand Celebration Hall</p>

      <h3>Countdown to Our Big Day</h3>

      <div class="countdown">
        <div class="time-box">
          <div id="days">0</div>Days
        </div>
        <div class="time-box">
          <div id="hours">0</div>Hours
        </div>
        <div class="time-box">
          <div id="minutes">0</div>Minutes
        </div>
        <div class="time-box">
          <div id="seconds">0</div>Seconds
        </div>
      </div>

      <!-- PHOTO GALLERY SECTION -->
      <div class="gallery">
        <h3>Our Beautiful Moments 📸</h3>
        <div class="gallery-grid">
          <img src="photo1.jpg" alt="Photo 1">
          <img src="photo2.jpg" alt="Photo 2">
          <img src="photo3.jpg" alt="Photo 3">
          <img src="photo4.jpg" alt="Photo 4">
          <img src="photo5.jpg" alt="Photo 5">
          <img src="photo6.jpg" alt="Photo 6">
        </div>
      </div>

      <div class="footer">
        We look forward to celebrating with you 💍
      </div>
    </div>
  </div>

  <script>
    const weddingDate = new Date("December 20, 2026 18:00:00").getTime();

    const timer = setInterval(function() {
      const now = new Date().getTime();
      const distance = weddingDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("days").innerHTML = days;
      document.getElementById("hours").innerHTML = hours;
      document.getElementById("minutes").innerHTML = minutes;
      document.getElementById("seconds").innerHTML = seconds;

      if (distance < 0) {
        clearInterval(timer);
        document.querySelector(".countdown").innerHTML = "🎉 We're Married! 🎉";
      }
    }, 1000);
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pradeep and Jyoti Wedding</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Elegant Gold Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: linear-gradient(to right, #1e1e1e, #3a2c1a);
      text-align: center;
      color: #fff;
    }

    .container {
      padding: 80px 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 50px;
      max-width: 850px;
      margin: auto;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    /* Luxury Gold Animated Text */
    .luxury-name {
      font-family: 'Playfair Display', serif;
      font-size: 72px;
      font-weight: 600;
      background: linear-gradient(
        90deg,
        #c5a100,
        #ffd700,
        #fff5b7,
        #ffd700,
        #c5a100
      );
      background-size: 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 6s linear infinite, fadeIn 2s ease forwards;
      opacity: 0;
    }

    @keyframes shine {
      0% { background-position: 0%; }
      100% { background-position: 300%; }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    h2 {
      margin-top: 20px;
      font-weight: normal;
      color: #f5e6c8;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .time-box {
      background: rgba(255,215,0,0.1);
      border: 1px solid rgba(255,215,0,0.4);
      padding: 20px;
      border-radius: 12px;
      min-width: 90px;
      font-size: 20px;
      color: #ffd700;
    }

    .gallery {
      margin-top: 60px;
    }

    .gallery h3 {
      color: #ffd700;
      margin-bottom: 20px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .gallery-grid img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      border-radius: 15px;
      transition: transform 0.4s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    .gallery-grid img:hover {
      transform: scale(1.08);
    }

    .footer {
      margin-top: 50px;
      font-size: 18px;
      color: #f5e6c8;
    }

    @media (max-width: 600px) {
      .luxury-name { font-size: 42px; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">

      <h1 class="luxury-name">Pradeep and Jyoti</h1>

      <h2>
        Together with their families invite you to celebrate their Wedding
      </h2>

      <p>20 December 2026 | Grand Celebration Hall</p>

      <!-- Countdown -->
      <div class="countdown">
        <div class="time-box"><div id="days">0</div>Days</div>
        <div class="time-box"><div id="hours">0</div>Hours</div>
        <div class="time-box"><div id="minutes">0</div>Minutes</div>
        <div class="time-box"><div id="seconds">0</div>Seconds</div>
      </div>

      <!-- Photo Gallery -->
      <div class="gallery">
        <h3>Our Beautiful Moments</h3>
        <div class="gallery-grid">
          <img src="photo1.jpg" alt="Photo 1">
          <img src="photo2.jpg" alt="Photo 2">
          <img src="photo3.jpg" alt="Photo 3">
          <img src="photo4.jpg" alt="Photo 4">
          <img src="photo5.jpg" alt="Photo 5">
          <img src="photo6.jpg" alt="Photo 6">
        </div>
      </div>

      <div class="footer">
        We look forward to celebrating with you ✨
      </div>

    </div>
  </div>

  <script>
    const weddingDate = new Date("December 20, 2026 18:00:00").getTime();

    const timer = setInterval(function() {
      const now = new Date().getTime();
      const distance = weddingDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("days").innerHTML = days;
      document.getElementById("hours").innerHTML = hours;
      document.getElementById("minutes").innerHTML = minutes;
      document.getElementById("seconds").innerHTML = seconds;

      if (distance < 0) {
        clearInterval(timer);
        document.querySelector(".countdown").innerHTML = "🎉 We're Married! 🎉";
      }
    }, 1000);
  </script>
</body>
</html>
